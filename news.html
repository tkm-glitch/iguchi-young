<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>活動報告｜井口ヤング</title>
  <meta name="description" content="井口ヤングの活動報告・試合結果・大会成績を、参照元の公式Jimdoサイト情報に合わせて掲載しています。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="news">
  <header id="site-header" class="site-header"></header>

  <main>
    <section class="hero">
      <div class="hero-layout">
        <div class="hero-copy">
          <span class="hero-kicker">News</span>
          <h1>活動報告</h1>
          <p>参照元の公式Jimdoサイトに掲載されている試合結果・活動報告をもとに、井口ヤングの近況をまとめています。</p>
          <div class="hero-actions">
            <a class="button button-primary" href="https://iguchiyoung.jimdofree.com/試合結果/" target="_blank" rel="noopener">参照元の試合結果へ</a>
            <a class="button button-secondary" href="https://www.instagram.com/iguchiyoung/" data-instagram-href>Instagramを見る</a>
          </div>
        </div>
        <figure class="hero-media">
          <img src="images/gallery-5.jpg" alt="井口ヤングの集合写真">
        </figure>
      </div>
    </section>

    <section class="section band-white">
      <div class="container">
        <div class="center">
          <p class="eyebrow">Recent Posts</p>
          <h2 class="section-title">最近の試合・活動</h2>
          <p class="section-lead">Aチーム、Bチーム、Cチームの公式掲載情報から抜粋しています。</p>
        </div>
        <div id="news-list" class="grid grid-3"></div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="center">
          <p class="eyebrow">Results</p>
          <h2 class="section-title">大会成績</h2>
        </div>
        <div id="achievements-list" class="grid grid-3"></div>
      </div>
    </section>

    <section class="section band-green">
      <div class="container split">
        <div>
          <p class="eyebrow">Official Channels</p>
          <h2 class="section-title">最新情報は公式SNSでも発信中</h2>
          <p class="section-lead">日々の活動写真やお知らせは、InstagramとFacebookでも確認できます。体験・見学のご相談は公式LINEがスムーズです。</p>
        </div>
        <div class="action-row">
          <a class="button button-primary" href="https://lin.ee/oZJ19DI" data-line-href>公式LINE</a>
          <a class="button button-outline" href="https://www.instagram.com/iguchiyoung/" data-instagram-href>Instagram</a>
          <a class="button button-outline" href="https://www.facebook.com/iguchiyoung" data-facebook-href>Facebook</a>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer" class="site-footer"></footer>
  <a class="floating-line" href="https://lin.ee/oZJ19DI" data-line-href>LINEで相談</a>

  <script src="config.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
